<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linxia</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --ink: #000000;
    --ink-muted: #555555;
    --ink-faint: #bbbbbb;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    opacity: 0;
    transform: translateY(18px);
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--ink-muted);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  h1 {
    font-size: clamp(3.2rem, 11vw, 6rem);
    font-weight: 300;
    line-height: 0.92;
    letter-spacing: -0.03em;
    margin-bottom: 2rem;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    font-weight: 300;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--ink);
    margin-bottom: 2rem;
  }

  .description {
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.75;
    color: var(--ink-muted);
    margin-bottom: 3rem;
    max-width: 360px;
  }

  .form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  label {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ink);
    text-transform: uppercase;
  }

  input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink-faint);
    padding: 0.6rem 0;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.15rem;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s ease;
    width: 100%;
    border-radius: 0;
  }

  input::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }

  input:focus {
    border-bottom-color: var(--ink);
  }

  .submit {
    margin-top: 1.5rem;
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 1rem 2rem;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .submit:hover {
    opacity: 0.78;
    transform: translateY(-1px);
  }

  .submit:active {
    transform: translateY(0);
    opacity: 1;
  }

  .footer-note {
    margin-top: 2.5rem;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    line-height: 1.9;
  }

  .success {
    display: none;
    padding: 1rem 0 2rem;
  }

  .success p {
    font-size: 1.15rem;
    font-weight: 300;
    font-style: italic;
    color: var(--ink-muted);
    line-height: 1.9;
  }

  .success .sig {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    margin-top: 1.5rem;
    display: block;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="wrapper">

  <p class="eyebrow">Linxia — Access restricted</p>

  <h1>See what<br>others <em>don't.</em></h1>

  <div class="divider"></div>

  <p class="description">
    One signal. Every week.<br>
    Geopolitics and economics — condensed, sourced, neutral.<br>
    Nothing more.
  </p>

  <div class="form" id="form">
    <div class="field">
      <label for="firstname">First name</label>
      <input type="text" id="firstname" placeholder="Your first name" autocomplete="off" />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="off" />
    </div>
    <button class="submit" onclick="handleSubmit()">Request access</button>
  </div>

  <div class="success" id="success">
    <p>Your request has been received.<br>If you are selected, you will know.</p>
    <span class="sig">— Linxia</span>
  </div>

  <p class="footer-note">
    Not indexed. Not advertised.<br>
    You found it. That already says something.
  </p>

</div>

<script>
  function handleSubmit() {
    const name = document.getElementById('firstname').value.trim();
    const email = document.getElementById('email').value.trim();
    if (!name || !email) return;
    document.getElementById('form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }
</script>

</body>
</html>
